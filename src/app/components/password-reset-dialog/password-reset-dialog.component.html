<h2 mat-dialog-title>Password Reset</h2>

<mat-dialog-content>
  <p class="user-email">{{ data.email }}</p>
  <p class="label">New password</p>
  <div class="password-box">
    <span class="password-text">{{ data.newPassword }}</span>
    <button
      mat-icon-button
      (click)="copyToClipboard()"
      matTooltip="Copy to clipboard"
      class="copy-btn"
    >
      <mat-icon>content_copy</mat-icon>
    </button>
  </div>
  <p class="note">
    Store this password securely — it cannot be retrieved after closing this dialog.
  </p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-raised-button color="primary" (click)="copyToClipboard()">
    <mat-icon>content_copy</mat-icon>
    Copy Password
  </button>
  <button mat-button (click)="close()">Close</button>
</mat-dialog-actions>
