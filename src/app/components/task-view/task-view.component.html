<div class="task-view-container">
  <div class="task-view-header">
    <button
      mat-fab
      color="primary"
      class="random-task-button"
      [disabled]="isLoadingRandom"
      (click)="onPrintRandomTask()"
      matTooltip="Print a random task"
    >
      <mat-icon>casino</mat-icon>
    </button>
    <button
      mat-flat-button
      [color]="privateMode ? 'warn' : undefined"
      (click)="togglePrivateMode()"
      [matTooltip]="
        privateMode
          ? 'Private mode ON — private tasks are visible'
          : 'Private mode OFF — click to show private tasks'
      "
    >
      <mat-icon>{{ privateMode ? 'lock_open' : 'lock' }}</mat-icon>
      {{ privateMode ? 'Private ON' : 'Private OFF' }}
    </button>
  </div>

  @if (dueTasks.length === 0) {
    <div class="no-tasks">
      <mat-icon>check_circle</mat-icon>
      <p>No upcoming urgent tasks</p>
    </div>
  }

  @for (task of dueTasks; track task.id) {
    <app-task-card
      [task]="task"
      mode="print-only"
      [showActions]="false"
      (printTask)="onPrintTask($event)"
      (viewDetails)="onViewDetails($event)"
    >
    </app-task-card>
  }
</div>
