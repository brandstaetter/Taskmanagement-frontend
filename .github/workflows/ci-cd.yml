name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: read  # For downloading artifacts
  checks: write  # For test results
  deployments: write  # For deployment status
  pull-requests: write  # For providing PR feedback

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Lint
      run: npm run lint
    
    - name: Run unit tests
      run: npm run test:ci
    
    - name: Build
      run: npm run build:prod
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/frontend

  # Full E2E tests run against local dev server + backend via Docker Compose.
  # Runs on self-hosted runner which has Docker available.
  e2e-tests:
    needs: build-and-test
    runs-on: [self-hosted, lan]
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v6

    - name: Checkout backend repo (for Docker build)
      uses: actions/checkout@v6
      with:
        repository: brandstaetter/Taskmanagement-App
        path: Taskmanagement-App

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install chromium  # deps pre-installed on runner

    - name: Start backend via Docker Compose
      run: |
        docker compose -f docker-compose.e2e.yml up -d --build --wait
        echo "Backend container started on port 8001"
      env:
        BACKEND_PATH: ./Taskmanagement-App
        E2E_BACKEND_PORT: 8001

    - name: Configure frontend for E2E backend port
      run: |
        sed -i 's|localhost:8000|localhost:8001|g' src/environments/environment.ts
        echo "Updated environment.ts to use port 8001"

    - name: Start frontend dev server
      run: npm start &
      env:
        NODE_ENV: development

    - name: Wait for frontend dev server
      run: |
        echo "Waiting for frontend on http://localhost:4200 ..."
        timeout=120
        elapsed=0
        until curl -sf http://localhost:4200 > /dev/null 2>&1; do
          if [ "$elapsed" -ge "$timeout" ]; then
            echo "Frontend did not start within ${timeout}s"
            exit 1
          fi
          sleep 2
          elapsed=$((elapsed + 2))
        done
        echo "Frontend is ready."

    - name: Run full E2E tests
      run: npx playwright test --project=full
      env:
        CI: 'true'
        E2E_ADMIN_USERNAME: 'admin'
        E2E_ADMIN_PASSWORD: 'E2eAdminPass-123'
        E2E_USERNAME: 'e2e-test@example.com'
        E2E_PASSWORD: 'E2eTestPass-123'

    - name: Stop backend container
      if: always()
      run: docker compose -f docker-compose.e2e.yml down -v

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14

    - name: Upload failure screenshots
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: e2e-failure-screenshots
        path: e2e/test-results/
        retention-days: 14

  deploy-to-lan:
    needs: [build-and-test, e2e-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, lan, nginx]

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist-artifact

    - name: Deploy to local Nginx
      run: |
        set -e
        rsync -av --delete dist-artifact/ /var/www/taskmanagement/
        sudo nginx -t
        sudo systemctl reload nginx

  # Post-deployment smoke tests run against the live production URL.
  # Runs on self-hosted runner to access LAN-deployed app.
  smoke-test:
    needs: deploy-to-lan
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, lan]
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run smoke tests against production
      run: npx playwright test --project=smoke
      env:
        CI: 'true'
        E2E_BASE_URL: ${{ secrets.DEPLOY_URL }}
        E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
        E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        E2E_ADMIN_USERNAME: ${{ secrets.E2E_ADMIN_USERNAME }}
        E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

    - name: Upload smoke test report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: smoke-test-report
        path: playwright-report/
        retention-days: 14

    - name: Upload failure screenshots
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: smoke-failure-screenshots
        path: e2e/test-results/
        retention-days: 14
