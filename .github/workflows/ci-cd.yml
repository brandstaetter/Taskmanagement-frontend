name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: read  # For downloading artifacts
  checks: write  # For test results
  deployments: write  # For deployment status
  pull-requests: write  # For providing PR feedback

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Lint
      run: npm run lint
    
    - name: Run unit tests
      run: npm run test:ci
    
    - name: Build
      run: npm run build:prod
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/frontend

  # Full E2E tests run against a local dev server.
  # NOTE: The full E2E suite requires a running backend (FastAPI).
  # Currently this job does NOT start the backend, so tests that hit real
  # API endpoints will fail until a backend service container or mock server
  # is added.  Set the environment variable E2E_SKIP to "true" to skip this
  # job until backend integration is in place.
  e2e-tests:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Start dev server
      run: npm start &
      env:
        NODE_ENV: development

    - name: Wait for dev server
      run: |
        echo "Waiting for dev server on http://localhost:4200 ..."
        timeout=120
        elapsed=0
        until curl -sf http://localhost:4200 > /dev/null 2>&1; do
          if [ "$elapsed" -ge "$timeout" ]; then
            echo "Dev server did not start within ${timeout}s"
            exit 1
          fi
          sleep 2
          elapsed=$((elapsed + 2))
        done
        echo "Dev server is ready."

    - name: Run full E2E tests
      run: npx playwright test --project=full
      env:
        CI: 'true'

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14

    - name: Upload failure screenshots
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: e2e-failure-screenshots
        path: e2e/test-results/
        retention-days: 14

  deploy-to-lan:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, lan, nginx]

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist-artifact

    - name: Deploy to local Nginx
      run: |
        set -e
        rsync -av --delete dist-artifact/ /var/www/taskmanagement/
        sudo nginx -t
        sudo systemctl reload nginx

  # Post-deployment smoke tests run against the live production URL.
  smoke-test:
    needs: deploy-to-lan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run smoke tests against production
      run: npx playwright test --project=smoke
      env:
        CI: 'true'
        E2E_BASE_URL: ${{ secrets.DEPLOY_URL }}
        E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
        E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

    - name: Upload smoke test report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: smoke-test-report
        path: playwright-report/
        retention-days: 14

    - name: Upload failure screenshots
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: smoke-failure-screenshots
        path: e2e/test-results/
        retention-days: 14
